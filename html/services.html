<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" href="../bg/logotittle.jpg" />
    <title>Our Services – Creative Creed</title>
    <meta name="description"
        content="Explore Creative Creed's full range of event production services — from professional audio systems to AI photobooths and live broadcasts." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;900&family=Barlow+Condensed:wght@700;900&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/services.css" />
</head>

<body>
    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <!-- Page Header -->
    <header class="services-hero">
        <div class="services-hero__inner">
            <p class="services-hero__eyebrow">From concept to execution,</p>
            <h1 class="services-hero__title">we make every idea happen</h1>
        </div>
    </header>

    <!-- Services Grid -->
    <main class="services-page">
        <div class="services-grid">

            <!-- 1 -->
            <div class="service-card" id="service-audio">
                <div class="service-card__img-wrap">
                    <img src="../ourservice-image/Professional Audio System.jpg" alt="Professional Audio System"
                        class="service-card__img" loading="lazy" />
                </div>
                <div class="service-card__label">
                    <span>Professional Audio System</span>
                </div>
            </div>

            <!-- 2 -->
            <div class="service-card" id="service-lighting">
                <div class="service-card__img-wrap">
                    <img src="../ourservice-image/Lighting System.JPG" alt="Lighting System" class="service-card__img"
                        loading="lazy" />
                </div>
                <div class="service-card__label">
                    <span>Lighting System</span>
                </div>
            </div>

            <!-- 3 -->
            <div class="service-card" id="service-visual">
                <div class="service-card__img-wrap">
                    <img src="../ourservice-image/Visual Display.jpeg" alt="Visual Display" class="service-card__img"
                        loading="lazy" />
                </div>
                <div class="service-card__label">
                    <span>Visual Display</span>
                </div>
            </div>

            <!-- 4 -->
            <div class="service-card" id="service-effects">
                <div class="service-card__img-wrap">
                    <img src="../ourservice-image/Special Effects.png" alt="Special Effects" class="service-card__img"
                        loading="lazy" />
                </div>
                <div class="service-card__label">
                    <span>Special Effects</span>
                </div>
            </div>

            <!-- 5 -->
            <div class="service-card" id="service-immersify">
                <div class="service-card__img-wrap">
                    <img src="../ourservice-image/Immersify.jpg" alt="Immersify" class="service-card__img"
                        loading="lazy" />
                </div>
                <div class="service-card__label">
                    <span>Immersify</span>
                </div>
            </div>

            <!-- 6 -->
            <div class="service-card" id="service-staging">
                <div class="service-card__img-wrap">
                    <img src="../ourservice-image/Staging & Platform.jpg" alt="Staging & Platform"
                        class="service-card__img" loading="lazy" />
                </div>
                <div class="service-card__label">
                    <span>Staging &amp; Platform</span>
                </div>
            </div>

            <!-- 7 -->
            <div class="service-card" id="service-truss">
                <div class="service-card__img-wrap">
                    <img src="../ourservice-image/Truss & Grand Support System.jpeg" alt="Truss & Grand Support System"
                        class="service-card__img" loading="lazy" />
                </div>
                <div class="service-card__label">
                    <span>Trust &amp; Grand Support System</span>
                </div>
            </div>

            <!-- 8 -->
            <div class="service-card" id="service-fabrication">
                <div class="service-card__img-wrap">
                    <img src="../ourservice-image/Custom Fabrication.jpg" alt="Custom Fabrication"
                        class="service-card__img" loading="lazy" />
                </div>
                <div class="service-card__label">
                    <span>Custom Fabrication</span>
                </div>
            </div>

            <!-- 9 -->
            <div class="service-card" id="service-broadcast">
                <div class="service-card__img-wrap">
                    <img src="../ourservice-image/Live Broadcast.jpg" alt="Live Broadcast" class="service-card__img"
                        loading="lazy" />
                </div>
                <div class="service-card__label">
                    <span>Live Broadcast</span>
                </div>
            </div>

            <!-- 10 -->
            <div class="service-card" id="service-photobooth">
                <div class="service-card__img-wrap">
                    <img src="../ourservice-image/AI Photobooth.png" alt="AI Photobooth" class="service-card__img"
                        loading="lazy" />
                </div>
                <div class="service-card__label">
                    <span>AI Photobooth</span>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <script src="../js/script.js"></script>
    <script src="../js/services.js"></script>
</body>

</html>
