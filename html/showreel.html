      <a

        class="btn-close-showreel"
        aria-label="Close Showreel"

          width="32"
          height="32"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"

          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </a>

        <button
          class="slider-arrow slider-arrow-prev"
          id="sliderPrev"
          aria-label="Previous Video"
        >
          &#10094;
        </button>

          <div class="showreel-track" id="showreelTrack">
            <!-- Video 1 -->
            <div class="showreel-slide">
              <video
                class="slider-video"
                src="../showreel/CC Reels 2019.mp4"
                autoplay
                loop
                muted
                playsinline
              ></video>
              <div class="vc" data-video-index="0">
                <!-- Play / Pause -->
                <button
                  class="vc__btn"
                  data-action="playpause"
                  aria-label="Play / Pause"
                >
                  <svg
                    class="vc__icon vc__icon--play"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                  >
                    <polygon points="5,3 19,12 5,21" />
                  </svg>
                  <svg
                    class="vc__icon vc__icon--pause"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                    style="display: none"
                  >
                    <rect x="5" y="3" width="4" height="18" />
                    <rect x="15" y="3" width="4" height="18" />
                  </svg>
                </button>
                <!-- Progress bar -->
                <div class="vc__progress" data-action="seek">
                  <div class="vc__progress-bar">
                    <div class="vc__progress-fill"></div>
                    <div class="vc__progress-thumb"></div>
                  </div>
                </div>
                <!-- Mute / Unmute + Volume Slider -->
                <div class="vc__vol-wrap">
                  <button
                    class="vc__btn"
                    data-action="mute"
                    aria-label="Mute / Unmute"
                  >
                    <svg
                      class="vc__icon vc__icon--vol"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <polygon points="11,5 6,9 2,9 2,15 6,15 11,19" />
                      <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                      <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
                    </svg>
                    <svg
                      class="vc__icon vc__icon--muted"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      style="display: none"
                    >
                      <polygon points="11,5 6,9 2,9 2,15 6,15 11,19" />
                      <line x1="23" y1="9" x2="17" y2="15" />
                      <line x1="17" y1="9" x2="23" y2="15" />
                    </svg>
                  </button>
                  <!-- Vertical Volume Slider -->
                  <div class="vc__vol-popup">
                    <input
                      class="vc__vol-slider"
                      data-action="volume"
                      type="range"
                      min="0"
                      max="1"
                      step="0.02"
                      value="1"
                      orient="vertical"
                      aria-label="Volume"
                    />
                  </div>
                </div>
                <!-- Fullscreen -->
                <button
                  class="vc__btn"
                  data-action="fullscreen"
                  aria-label="Fullscreen"
                >
                  <svg
                    class="vc__icon"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M8 3H5a2 2 0 0 0-2 2v3" />
                    <path d="M21 8V5a2 2 0 0 0-2-2h-3" />
                    <path d="M3 16v3a2 2 0 0 0 2 2h3" />
                    <path d="M16 21h3a2 2 0 0 0 2-2v-3" />
                  </svg>
                </button>
              </div>
